# Default Hyprland config for bluefin-dx-hypr.
# Override per-user by editing ~/.config/hypr/hyprland.conf.

monitor = , preferred, auto, 1

$mod = SUPER
$terminal = alacritty
$menu = fuzzel
$filemanager = nautilus
$browser = flatpak run app.zen_browser.zen

# Autostart
# `wayle shell` runs the panel, notifications, OSD, systray, wallpaper, and idle daemon in one process.
exec-once = wayle shell
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    layout = dwindle
}

decoration {
    rounding = 6
}

# --- Shell / core ---
bind = $mod, Return, exec, $terminal
bind = $mod, E, exec, $filemanager
bind = $mod, B, exec, $browser
bind = $mod, Space, exec, $menu
bind = $mod, V, exec, sh -c 'cliphist list | fuzzel --dmenu | cliphist decode | wl-copy'

# --- Window / session ---
bind = $mod, Q, killactive,
bind = $mod CTRL SHIFT, Q, exit,
bind = $mod, Escape, exec, hyprlock

# --- Window focus (rtds, niri-style) ---
bind = $mod, R, movefocus, l
bind = $mod, S, movefocus, r
bind = $mod, T, movefocus, d
bind = $mod, D, movefocus, u

# --- Move window in direction ---
bind = $mod SHIFT, R, movewindow, l
bind = $mod SHIFT, S, movewindow, r
bind = $mod SHIFT, T, movewindow, d
bind = $mod SHIFT, D, movewindow, u

# --- Workspaces 1-9 ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# --- Workspace navigation ---
bind = $mod, J, workspace, e+1
bind = $mod, K, workspace, e-1
bind = $mod, C, workspace, e+1
bind = $mod, L, workspace, e-1
bind = $mod, Tab, workspace, previous
bind = $mod SHIFT, J, movetoworkspace, e+1
bind = $mod SHIFT, K, movetoworkspace, e-1
bind = $mod SHIFT, C, movetoworkspace, e+1
bind = $mod SHIFT, L, movetoworkspace, e-1
bind = CTRL SHIFT, Right, workspace, e+1
bind = CTRL SHIFT, Left, workspace, e-1

# --- Monitor focus ---
bind = $mod, Left, focusmonitor, l
bind = $mod, Right, focusmonitor, r
bind = $mod, Up, focusmonitor, u
bind = $mod, Down, focusmonitor, d

# --- Move window to monitor ---
bind = $mod SHIFT, Left, movewindow, mon:l
bind = $mod SHIFT, Right, movewindow, mon:r
bind = $mod SHIFT, Up, movewindow, mon:u
bind = $mod SHIFT, Down, movewindow, mon:d

# --- Move current workspace to monitor ---
bind = $mod CTRL SHIFT, Left, movecurrentworkspacetomonitor, l
bind = $mod CTRL SHIFT, Right, movecurrentworkspacetomonitor, r
bind = $mod CTRL SHIFT, Up, movecurrentworkspacetomonitor, u
bind = $mod CTRL SHIFT, Down, movecurrentworkspacetomonitor, d

# --- Sizing & state ---
bind = $mod, F, fullscreen, 1
bind = $mod SHIFT, F, fullscreen, 0
bind = $mod, semicolon, togglefloating,
bind = $mod, minus, resizeactive, -100 0
bind = $mod, equal, resizeactive, 100 0
bind = $mod SHIFT, minus, resizeactive, 0 -100
bind = $mod SHIFT, equal, resizeactive, 0 100

# --- Scratchpad (special workspace) ---
bind = $mod, slash, togglespecialworkspace,
bind = $mod SHIFT, slash, movetoworkspacesilent, special

# --- Volume / brightness ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# --- Screenshots ---
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = CTRL, Print, exec, grim - | wl-copy
bind = ALT, Print, exec, grim -g "$(hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" - | wl-copy
