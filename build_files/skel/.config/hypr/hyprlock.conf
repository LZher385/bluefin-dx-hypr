background {
    monitor =
    color = rgba(20, 20, 28, 1.0)
}

input-field {
    monitor =
    size = 280, 56
    outline_thickness = 2
    inner_color = rgba(0, 0, 0, 0.4)
    outer_color = rgba(122, 162, 247, 1.0)
    font_color = rgb(220, 220, 220)
    placeholder_text = <i>password</i>
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 64
    position = 0, 80
    halign = center
    valign = center
}
