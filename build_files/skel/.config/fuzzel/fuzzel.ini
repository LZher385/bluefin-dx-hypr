# Tokyo Night theme for fuzzel
# Palette: https://github.com/folke/tokyonight.nvim (Night variant)

[main]
font=Iosevka Nerd Font:size=12
terminal=kitty
prompt="❯ "
icon-theme=Adwaita
icons-enabled=yes
fields=name,generic,comment,categories,filename,keywords
width=42
lines=10
tabs=4
horizontal-pad=24
vertical-pad=14
inner-pad=10
line-height=24
letter-spacing=0
layer=overlay
anchor=center

[colors]
# Tokyo Night – Night
background=1a1b26f2
text=c0caf5ff
prompt=7aa2f7ff
placeholder=565f89ff
input=c0caf5ff
match=7dcfffff
selection=283457ff
selection-text=c0caf5ff
selection-match=7dcfffff
counter=565f89ff
border=7aa2f7ff

[border]
width=2
radius=12

[dmenu]
exit-immediately-if-empty=no

[key-bindings]
cancel=Escape Control+g
execute=Return KP_Enter
delete-prev-word=Control+BackSpace Mod1+BackSpace Control+w
delete-line-forward=none
prev=Up Control+p Control+k
next=Down Control+n Control+j
